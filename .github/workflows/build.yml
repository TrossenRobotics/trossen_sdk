name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libopencv-dev \
          libprotobuf-dev \
          protobuf-compiler \
          pkg-config \
          libbz2-dev \
          zlib1g-dev

    - name: Install Parquet dependencies
      run: |
        wget https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb && \
        sudo apt-get update && \
        sudo apt-get install -yqq --no-install-recommends \
          ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb && \
        sudo apt-get update && \
        sudo apt-get install -yqq --no-install-recommends \
          libarrow-dev \
          libparquet-dev && \
        rm apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb

    - name: Install libtrossen_arm
      run: |
        # Clone and install libtrossen_arm dependency
        git clone https://github.com/TrossenRobotics/libtrossen_arm.git /tmp/libtrossen_arm
        cd /tmp/libtrossen_arm
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build SDK
      run: |
        make build NPROC=$(nproc)

    - name: Run Tests
      run: |
        make test-verbose
