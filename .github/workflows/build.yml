name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libopencv-dev \
          libprotobuf-dev \
          protobuf-compiler \
          pkg-config \
          libbz2-dev \
          zlib1g-dev

    - name: Install Parquet dependencies
      run: |
        wget https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb && \
        sudo apt-get update && \
        sudo apt-get install -yqq --no-install-recommends \
          ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb && \
        sudo apt-get update && \
        sudo apt-get install -yqq --no-install-recommends \
          libarrow-dev \
          libparquet-dev && \
        rm apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb

    - name: Install libtrossen_arm
      run: |
        # Clone and install libtrossen_arm dependency
        git clone https://github.com/TrossenRobotics/libtrossen_arm.git /tmp/libtrossen_arm
        cd /tmp/libtrossen_arm
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Install RealSense
      run: |
        sudo mkdir -p /etc/apt/keyrings

        # Register the RealSense signing key (official method)
        curl -sSf https://librealsense.realsenseai.com/Debian/librealsenseai.asc | \
          gpg --dearmor | sudo tee /etc/apt/keyrings/librealsenseai.gpg > /dev/null
        sudo chmod 0644 /etc/apt/keyrings/librealsenseai.gpg

        # Make sure apt HTTPS support is installed
        sudo apt-get install -y apt-transport-https

        # Add the server to the list of repositories
        echo "deb [signed-by=/etc/apt/keyrings/librealsenseai.gpg] https://librealsense.realsenseai.com/Debian/apt-repo $(lsb_release -cs) main" | \
          sudo tee /etc/apt/sources.list.d/librealsense.list

        sudo apt-get update

        # Install RealSense packages (latest versions)
        sudo apt-get install -y \
          libfastcdr-dev \
          libfastrtps-dev \
          librealsense2-dev

    - name: Build SDK
      run: |
        mkdir -p build
        cd build && cmake -DTROSSEN_ENABLE_REALSENSE=ON .. && make -j$(nproc)

    - name: Run Tests
      run: |
        mkdir -p build
        cd build && cmake -DTROSSEN_ENABLE_REALSENSE=ON -DBUILD_TESTING=ON .. && ctest --output-on-failure
