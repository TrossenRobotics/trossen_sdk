syntax = "proto3";
package trossen_sdk.msg;

import "timestamp.proto";

// Image message containing raw image data and metadata
message Image {
  // Timestamp of the image record
  trossen_sdk.Timestamp ts = 1;

  // Sequence number of the image record
  uint64 seq = 2;

  // The frame ID associated with the image
  string frame_id = 3;

  // Image width in pixels
  uint32 width = 4;

  // Image height in pixels
  uint32 height = 5;

  // Number of channels in the image (e.g., 3 for RGB, 4 for RGBA)
  uint32 channels = 6;

  // Pixel format (e.g., "RGB8", "RGBA8", "GRAY8")
  string pixel_format = 7;

  // Raw image data
  bytes data = 8;
}
