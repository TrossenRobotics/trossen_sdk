# Dev compose for the Trossen SDK webapp.
#
# Both services run on the host network so the backend can talk to arms /
# cameras / mobile bases on 192.168.1.x and the frontend's Vite proxy
# (target http://localhost:8000 in vite.config.ts) reaches the backend
# without any extra plumbing.
#
# Usage (from the repo root or webapp/):
#   cd webapp
#   docker compose up --build
#
# Then open http://localhost:5173 in a browser.

services:
  backend:
    build:
      context: ..                      # repo root, so the SDK source is in build context
      dockerfile: webapp/backend/Dockerfile
    image: trossen-sdk-webapp-backend:dev
    container_name: trossen_webapp_backend
    network_mode: host                 # host Ethernet (arm subnet) + localhost wiring
    # Bind-mounting /dev exposes device nodes, but Docker's cgroup device
    # controller still blocks access at the kernel level (EPERM on open).
    # device_cgroup_rules whitelists the relevant majors so root in the
    # container can actually use the cameras:
    #   c 81:* rmw   — V4L2 video devices (/dev/video*)
    #   c 189:* rmw  — USB raw devices (/dev/bus/usb/*)
    # If RealSense still fails (some firmwares poke sysfs paths beyond these
    # majors), escalate to `privileged: true`.
    device_cgroup_rules:
      - 'c 81:* rmw'
      - 'c 189:* rmw'
    volumes:
      - /dev:/dev
      # Source bind-mount for hot reload. The whole repo is mounted so the
      # editable trossen_sdk install can see the C++ sources too.
      - ..:/app
      # Named volume keeps the .venv (and the compiled pybind extension)
      # out of the host source tree.
      - backend_venv:/app/webapp/backend/.venv
      # Host-writable data dirs. Datasets, configs, and the SQLite DB land
      # under the operator's home directory and survive container teardown.
      - ${HOME}/.trossen_sdk:/root/.trossen_sdk                          # MCAP recordings
      - ${HOME}/.cache/huggingface/lerobot:/root/.cache/huggingface/lerobot  # LeRobot conversions
      - ${HOME}/.config/trossen_sdk_webapp:/root/.config/trossen_sdk_webapp  # system + dataset settings
      - ${HOME}/.local/state/trossen_sdk_webapp:/root/.local/state/trossen_sdk_webapp  # SQLite DB + sessions
    group_add:
      - video        # /dev/video* for OpenCV / V4L2 cameras
      - plugdev      # USB hot-plug
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: trossen-sdk-webapp-frontend:dev
    container_name: trossen_webapp_frontend
    network_mode: host                 # so Vite's /api proxy hits localhost:8000
    volumes:
      - ./frontend:/app/webapp/frontend
      - frontend_node_modules:/app/webapp/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_venv:
  frontend_node_modules:
