# cpplint configuration file
# See https://github.com/cpplint/cpplint for details

# Set the line length
linelength=100

# Filter out rules you don't want
# Use - to disable a rule, + to enable it
filter=-build/c++17
filter=-build/header_guard
filter=-build/include
filter=-legal/copyright
filter=-whitespace/indent_namespace
# filter=-whitespace/line_length
# filter=-whitespace/comments
filter=-whitespace/braces
filter=-whitespace/indent
# filter=-whitespace/tab
# filter=-readability/todo
# filter=-runtime/references
# filter=-runtime/string

# Exclude specific paths (in addition to global pre-commit exclude)
exclude_files=third_party/.*
